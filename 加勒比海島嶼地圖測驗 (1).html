<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>加勒比海島國地圖測驗</title>
<style>
:root{
  --sea0:#07293a; --sea1:#0c3e53; --sea2:#166079;
  --land:#ecd9a8; --land-line:#8f7443;
  --ctx:#0e3849; --ctx-line:#1d5468;
  --good:#3ecf8e; --mid:#f4b942; --bad:#ef5350; --accent:#35d0c2;
  --panel:rgba(5,28,40,.86); --ink:#eaf6fa; --ink-dim:#9dc3d2;
  --g-sov:#ecd9a8; --g-uk:#f0958f; --g-fr:#9db4ff; --g-nl:#ffb066; --g-us:#8fd3fe;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{
  font-family:"Noto Sans TC","PingFang TC","Microsoft JhengHei",system-ui,sans-serif;
  background:radial-gradient(120% 90% at 50% 0%, var(--sea2) 0%, var(--sea1) 45%, var(--sea0) 100%);
  color:var(--ink); overflow:hidden; touch-action:manipulation;
}
#app{height:100%;display:flex;flex-direction:column;max-width:1100px;margin:0 auto;padding:10px 12px}

/* ---------- start screen ---------- */
.screen{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:22px;text-align:center;overflow:auto}
h1{font-size:clamp(24px,4.5vw,40px);font-weight:900;letter-spacing:.12em}
h1 span{color:var(--accent)}
.sub{color:var(--ink-dim);font-size:14px;letter-spacing:.25em;margin-top:8px}
.card{background:var(--panel);border:1px solid rgba(255,255,255,.08);border-radius:16px;padding:18px 22px;width:min(480px,94vw)}
.card h3{font-size:13px;color:var(--ink-dim);letter-spacing:.3em;margin-bottom:12px;font-weight:700}
.optrow{display:flex;gap:8px;flex-wrap:wrap;justify-content:center}
.opt{flex:1;min-width:120px;padding:12px 8px;border-radius:12px;border:1.5px solid rgba(255,255,255,.14);
  background:rgba(255,255,255,.04);color:var(--ink);font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;transition:.15s}
.opt small{display:block;font-weight:400;color:var(--ink-dim);font-size:11.5px;margin-top:3px}
.opt.sel{border-color:var(--accent);background:rgba(53,208,194,.14);color:#c8fff8}
.opt:hover{border-color:rgba(53,208,194,.6)}
.bigbtn{padding:14px 60px;font-size:18px;font-weight:900;letter-spacing:.3em;border:none;border-radius:999px;cursor:pointer;
  background:linear-gradient(135deg,#37d3c0,#2ba3c9);color:#04222c;font-family:inherit;box-shadow:0 6px 24px rgba(53,208,194,.35)}
.bigbtn:active{transform:scale(.97)}

/* ---------- game layout ---------- */
#game{flex:1;display:none;flex-direction:column;gap:8px;min-height:0}
#topbar{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
#prompt{flex:1;min-width:200px;background:var(--panel);border:1px solid rgba(255,255,255,.08);border-radius:14px;padding:10px 16px;display:flex;align-items:center;gap:10px}
#prompt .q{font-size:13px;color:var(--ink-dim);white-space:nowrap}
#prompt .name{font-size:clamp(17px,3vw,22px);font-weight:900;letter-spacing:.05em}
#prompt .en{font-size:12px;color:var(--ink-dim)}
.badge{font-size:11px;padding:3px 9px;border-radius:999px;font-weight:700;white-space:nowrap}
.b-sov{background:rgba(236,217,168,.16);color:#ecd9a8;border:1px solid rgba(236,217,168,.4)}
.b-uk{background:rgba(240,149,143,.14);color:#f0958f;border:1px solid rgba(240,149,143,.4)}
.b-fr{background:rgba(157,180,255,.14);color:#9db4ff;border:1px solid rgba(157,180,255,.4)}
.b-nl{background:rgba(255,176,102,.14);color:#ffb066;border:1px solid rgba(255,176,102,.4)}
.b-us{background:rgba(143,211,254,.14);color:#8fd3fe;border:1px solid rgba(143,211,254,.4)}
#stats{display:flex;align-items:center;gap:10px;background:var(--panel);border:1px solid rgba(255,255,255,.08);border-radius:14px;padding:10px 14px;font-size:13px;font-weight:700}
#stats .dot{display:inline-block;width:9px;height:9px;border-radius:50%;margin-right:4px}
#hintbtn{padding:10px 16px;border-radius:14px;border:1.5px solid rgba(53,208,194,.5);background:rgba(53,208,194,.1);color:#aef3ea;font-weight:700;font-size:14px;cursor:pointer;font-family:inherit}
#hintbtn:disabled{opacity:.35;cursor:default}
#quitbtn{padding:10px 14px;border-radius:14px;border:1.5px solid rgba(255,255,255,.18);background:rgba(255,255,255,.04);color:var(--ink-dim);font-weight:700;font-size:14px;cursor:pointer;font-family:inherit;white-space:nowrap}
#quitbtn.arm{border-color:var(--bad);color:#ffb3b1;background:rgba(239,83,80,.1)}

#mapwrap{flex:1;position:relative;min-height:0;border-radius:16px;overflow:hidden;border:1px solid rgba(255,255,255,.1);
  background:radial-gradient(90% 80% at 45% 35%, #14586f 0%, #0d4257 55%, #082f42 100%)}
svg{width:100%;height:100%;display:block;cursor:grab;touch-action:none}
svg.grabbing{cursor:grabbing}
.gridline{stroke:rgba(180,225,240,.07);stroke-width:1;vector-effect:non-scaling-stroke}
.sealabel{fill:rgba(180,225,240,.16);font-size:26px;letter-spacing:.5em;font-weight:700}
.ctx{fill:var(--ctx);stroke:var(--ctx-line);stroke-width:1;vector-effect:non-scaling-stroke;pointer-events:none}
.isl{fill:var(--land);stroke:var(--land-line);stroke-width:1;vector-effect:non-scaling-stroke;cursor:pointer;transition:fill .12s}
.isl:hover{fill:#f8ecc4}
.mk{stroke:rgba(5,25,35,.9);cursor:pointer;transition:fill .12s;fill:var(--land)}
.mk.hidden{display:none}
.lead{stroke:rgba(200,240,255,.8);fill:none;pointer-events:none}
.lead.hidden{display:none}
svg .hidden{display:none}
.res-g{fill:var(--good)!important}.res-y{fill:var(--mid)!important}.res-r{fill:var(--bad)!important}
.grp-sov{fill:var(--g-sov)}.grp-uk{fill:var(--g-uk)}.grp-fr{fill:var(--g-fr)}.grp-nl{fill:var(--g-nl)}.grp-us{fill:var(--g-us)}
.flashwrong{fill:var(--bad)!important}
.target{fill:var(--accent)!important;animation:pulse 1s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.45}}
@media (prefers-reduced-motion: reduce){.target{animation:none}}

#zoomctl{position:absolute;right:10px;top:10px;display:flex;flex-direction:column;gap:6px}
#zoomctl button{width:38px;height:38px;border-radius:10px;border:1px solid rgba(255,255,255,.15);background:var(--panel);color:var(--ink);font-size:19px;cursor:pointer;font-family:inherit}
#edgepan{display:none}
#edgepan.show{display:block}
#edgepan button{position:absolute;border-radius:10px;border:1px solid rgba(255,255,255,.18);
  background:rgba(5,28,40,.55);color:rgba(234,246,250,.75);font-size:14px;cursor:pointer;
  font-family:inherit;z-index:3;touch-action:none}
#edgepan button:hover{background:rgba(53,208,194,.25);color:#fff;border-color:var(--accent)}
#edgepan.show ~ #regions{bottom:46px}
#regions{position:absolute;left:10px;bottom:10px;display:flex;gap:6px;flex-wrap:wrap;max-width:75%}
#regions button{padding:6px 11px;border-radius:999px;border:1px solid rgba(255,255,255,.16);background:var(--panel);color:var(--ink-dim);font-size:12px;cursor:pointer;font-family:inherit;font-weight:700}
#regions button:hover{color:var(--ink);border-color:var(--accent)}

#toast{position:absolute;top:48px;left:50%;transform:translateX(-50%) translateY(-8px);background:var(--panel);
  border:1px solid rgba(255,255,255,.15);border-radius:999px;padding:9px 20px;font-weight:900;font-size:15px;
  opacity:0;transition:.25s;pointer-events:none;white-space:nowrap;z-index:5}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
#toast.ok{color:var(--good)} #toast.no{color:var(--bad)} #toast.info{color:var(--accent)}

#choices{display:none;grid-template-columns:1fr 1fr;gap:8px}
#choices button{padding:13px 10px;border-radius:12px;border:1.5px solid rgba(255,255,255,.14);background:var(--panel);
  color:var(--ink);font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;transition:.12s}
#choices button small{display:block;font-weight:400;font-size:11px;color:var(--ink-dim);margin-top:2px}
#choices button:not(:disabled):hover{border-color:var(--accent)}
#choices button.c-ok{border-color:var(--good);background:rgba(62,207,142,.15);color:#bdf5dc}
#choices button.c-no{border-color:var(--bad);background:rgba(239,83,80,.12);color:#ffc4c2;opacity:.75}
#choices button:disabled{cursor:default}

#infocard{position:absolute;left:50%;bottom:56px;transform:translateX(-50%);background:var(--panel);backdrop-filter:blur(6px);
  border:1px solid rgba(255,255,255,.15);border-radius:14px;padding:12px 20px;text-align:center;display:none;z-index:4;min-width:220px}
#infocard .name{font-size:19px;font-weight:900}
#infocard .en{font-size:12px;color:var(--ink-dim);margin:2px 0 6px}
#legend{position:absolute;right:10px;bottom:10px;background:var(--panel);border:1px solid rgba(255,255,255,.12);
  border-radius:12px;padding:9px 12px;display:none;font-size:12px;line-height:1.9}
#legend i{display:inline-block;width:11px;height:11px;border-radius:3px;margin-right:6px;vertical-align:-1px}

/* ---------- results ---------- */
#result{display:none;flex-direction:column;gap:10px;flex:1;min-height:0;overflow:auto}
#result .board{background:var(--panel);border:1px solid rgba(255,255,255,.1);border-radius:16px;padding:16px;text-align:center}
#result .score{font-size:clamp(30px,6vw,46px);font-weight:900;color:var(--accent)}
#result .breakdown{display:flex;justify-content:center;gap:22px;margin-top:8px;font-weight:700;font-size:15px}
#mistakes{font-size:13.5px;color:var(--ink-dim);line-height:2;text-align:center}
#mistakes b{color:var(--ink)}
.btnrow{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
.ghost{padding:11px 26px;border-radius:999px;border:1.5px solid rgba(255,255,255,.25);background:transparent;color:var(--ink);font-weight:700;font-size:15px;cursor:pointer;font-family:inherit}
@media (max-width:560px){
  #app{padding:8px}
  #prompt{padding:8px 12px}
  #regions{max-width:70%}
  #choices{grid-template-columns:1fr 1fr}
}
</style>
</head>
<body>
<div id="app">

  <!-- start -->
  <div class="screen" id="start">
    <div>
      <h1>加勒比海 <span>島嶼地圖測驗</span></h1>
      <p class="sub">CARIBBEAN&nbsp;ISLANDS</p>
    </div>
    <div class="card">
      <h3>測驗模式</h3>
      <div class="optrow" id="modeRow">
        <button class="opt sel" data-mode="click">🗺️ 地圖點選<small>依名稱點出島嶼位置</small></button>
        <button class="opt" data-mode="mc">📝 選擇題<small>看位置選出正確名稱</small></button>
        <button class="opt" data-mode="review">📖 複習模式<small>自由瀏覽各島嶼</small></button>
      </div>
    </div>
    <div class="card">
      <h3>測驗範圍</h3>
      <div class="optrow" id="rangeRow">
        <button class="opt sel" data-range="all">全部<small id="cntAll"></small></button>
        <button class="opt" data-range="sov">獨立國家<small id="cntSov"></small></button>
        <button class="opt" data-range="ter">海外屬地<small id="cntTer"></small></button>
      </div>
    </div>
    <button class="bigbtn" id="startBtn">開始</button>
  </div>

  <!-- game -->
  <div id="game">
    <div id="topbar">
      <div id="prompt"></div>
      <div id="stats"></div>
      <button id="hintbtn">💡 提示</button>
      <button id="quitbtn">✕ 離開</button>
    </div>
    <div id="mapwrap">
      <svg id="map" xmlns="http://www.w3.org/2000/svg"></svg>
      <div id="zoomctl">
        <button id="zin">＋</button><button id="zout">－</button><button id="zfit">⛶</button>
      </div>
      <div id="edgepan">
        <button data-dir="up" style="top:8px;left:50%;transform:translateX(-50%);width:34%;height:32px">▲</button>
        <button data-dir="down" style="bottom:8px;left:50%;transform:translateX(-50%);width:34%;height:32px">▼</button>
        <button data-dir="left" style="left:8px;top:50%;transform:translateY(-50%);height:34%;width:32px">◀</button>
        <button data-dir="right" style="right:8px;top:50%;transform:translateY(-50%);height:34%;width:32px">▶</button>
      </div>
      <div id="regions"></div>
      <div id="toast"></div>
      <div id="infocard"></div>
      <div id="legend"></div>
    </div>
    <div id="choices"></div>
  </div>

  <!-- result -->
  <div id="result">
    <div class="board">
      <div style="font-size:13px;letter-spacing:.3em;color:var(--ink-dim);font-weight:700">測驗結果</div>
      <div class="score" id="scoreTxt"></div>
      <div class="breakdown" id="breakTxt"></div>
      <div id="mistakes"></div>
    </div>
    <div id="mapwrap2" style="flex:1;position:relative;min-height:220px;border-radius:16px;overflow:hidden;border:1px solid rgba(255,255,255,.1);background:radial-gradient(90% 80% at 45% 35%, #14586f 0%, #0d4257 55%, #082f42 100%)"></div>
    <div class="btnrow">
      <button class="bigbtn" id="againBtn" style="padding:12px 40px">再玩一次</button>
      <button class="ghost" id="homeBtn">回主選單</button>
    </div>
  </div>
</div>

function el(tag, attrs, parent){
  const n = document.createElementNS(svgNS, tag);
  for(const k in attrs) n.setAttribute(k, attrs[k]);
  if(parent) parent.appendChild(n);
  return n;
}

// which islands get a callout dot, and the leader direction (degrees, y-down: 0=右, 90=下, -90=上)
const ANG = {aruba:-90, curacao:-60, tci:-45, usvi:90, bvi:-45, anguilla:-90,
  "st-martin":-145, "sint-maarten":145, "st-barth":0, skn:135, montserrat:160,
  antigua:0, dominica:0, martinique:0, "st-lucia":0, svg:180, grenada:180, barbados:-45,
  "car-nl":[20,165], cayman:[135,-45]};
function markersFor(o){
  const diag = Math.hypot(o.bbox[2]-o.bbox[0], o.bbox[3]-o.bbox[1]);
  if(o.id==="cayman"){
    // 兩島引線向內收，共用一個標註點（放在兩島之間偏上的空海面）
    const a=o.mk[0], b=o.mk[1];
    const to=[(a[0]+b[0])/2, (a[1]+b[1])/2 - 7];
    const ld=Math.max(a[2],b[2]);
    return [{x:a[0],y:a[1],ld,to},{x:b[0],y:b[1],ld,to,noDot:true}];
  }
  if(o.id==="car-nl")
    return o.mk.slice(0,2).map((m,i)=>({x:m[0], y:m[1], ld:m[2], ang:ANG[o.id][i]*Math.PI/180}));
  if(ANG[o.id]!==undefined)
    return [{x:o.mk[0][0], y:o.mk[0][1], ld:diag, ang:ANG[o.id]*Math.PI/180}];
  return [];
}

function buildMap(svgTarget, interactive){
  svgTarget.innerHTML = "";
  svgTarget.setAttribute("viewBox", `0 0 ${MAP_W} ${MAP_H}`);
  svgTarget.setAttribute("preserveAspectRatio","xMidYMid meet");
  const g = el("g",{},svgTarget);
  // graticule every 5°
  const COS=Math.cos(18.7*Math.PI/180), S=42, LON0=-85.6, LAT1=27.6;
  for(let lon=-85; lon<=-60; lon+=5){
    const x=(lon-LON0)*COS*S;
    el("line",{x1:x,y1:0,x2:x,y2:MAP_H,class:"gridline"},g);
  }
  for(let lat=10; lat<=25; lat+=5){
    const y=(LAT1-lat)*S;
    el("line",{x1:0,y1:y,x2:MAP_W,y2:y,class:"gridline"},g);
  }
  el("path",{d:CONTEXT_D,class:"ctx","fill-rule":"evenodd"},g);
  const t1=el("text",{x:MAP_W*0.55,y:MAP_H*0.18,class:"sealabel","text-anchor":"middle"},g); t1.textContent="大西洋";
  const t2=el("text",{x:MAP_W*0.42,y:MAP_H*0.72,class:"sealabel","text-anchor":"middle"},g); t2.textContent="加勒比海";
  const paths={}, marks={}, leads={}, hits={}, meta={};
  ISLANDS.forEach(o=>{
    const p = el("path",{d:o.d,class:"isl","data-id":o.id,"fill-rule":"evenodd"},g);
    paths[o.id]=p;
    meta[o.id]=markersFor(o);
    leads[o.id]=meta[o.id].map(m=> el("line",{x1:m.x,y1:m.y,x2:m.x,y2:m.y,class:"lead"},g));
    marks[o.id]=meta[o.id].map(m=> el("circle",{cx:m.x,cy:m.y,r:6,class:"mk","data-id":o.id},g));
    hits[o.id]=meta[o.id].map(m=> el("circle",{cx:m.x,cy:m.y,r:10,"data-id":o.id,fill:"transparent",style:"cursor:pointer"},g));
  });
  return {g, paths, marks, leads, hits, meta};
}

const main = buildMap(mapEl, true);

function applyVB(){
  mapEl.setAttribute("viewBox", `${vb.x} ${vb.y} ${vb.w} ${vb.h}`);
  const dp = document.getElementById("edgepan");
  if(dp) dp.classList.toggle("show", vb.w < MAP_W*0.92);
  updateMarkers();
}
function clampVB(){
  vb.w = Math.min(Math.max(vb.w, MINW), MAXW);
  vb.h = vb.w * MAP_H/MAP_W;
  const mX = vb.w*0.35, mY = vb.h*0.35;
  vb.x = Math.min(Math.max(vb.x, -mX), MAP_W - vb.w + mX);
  vb.y = Math.min(Math.max(vb.y, -mY), MAP_H - vb.h + mY);
}
function screenScale(){
  const r = mapEl.getBoundingClientRect();
  return Math.min(r.width/vb.w, r.height/vb.h);
}
function clientToSvg(cx, cy){
  const r = mapEl.getBoundingClientRect();
  const s = screenScale();
  const ox = (r.width - vb.w*s)/2, oy = (r.height - vb.h*s)/2;
  return [vb.x + (cx - r.left - ox)/s, vb.y + (cy - r.top - oy)/s];
}
function zoomAt(cx, cy, factor){
  const [sx, sy] = clientToSvg(cx, cy);
  const nw = Math.min(Math.max(vb.w/factor, MINW), MAXW);
  const f = vb.w/nw;
  vb.x = sx - (sx - vb.x)/f;
  vb.y = sy - (sy - vb.y)/f;
  vb.w = nw; clampVB(); applyVB();
}
function fitBBox(b, padFrac){
  const pad = Math.max((b[2]-b[0]), (b[3]-b[1])) * (padFrac==null?0.25:padFrac) + 4;
  let x0=b[0]-pad, y0=b[1]-pad, x1=b[2]+pad, y1=b[3]+pad;
  let w=x1-x0, h=y1-y0;
  if(w/h > MAP_W/MAP_H){ h = w*MAP_H/MAP_W; } else { w = h*MAP_W/MAP_H; }
  vb.x = (x0+x1)/2 - w/2; vb.y = (y0+y1)/2 - h/2; vb.w=w; vb.h=h;
  clampVB(); applyVB();
}
function fitAll(){ vb={x:0,y:0,w:MAP_W,h:MAP_H}; applyVB(); }
function unionBBox(ids){
  let b=[1e9,1e9,-1e9,-1e9];
  ids.forEach(id=>{const o=byId[id];
    b[0]=Math.min(b[0],o.bbox[0]); b[1]=Math.min(b[1],o.bbox[1]);
    b[2]=Math.max(b[2],o.bbox[2]); b[3]=Math.max(b[3],o.bbox[3]);});
  return b;
}
function updateMarkersFor(m, svgEl, vbo){
  const rect = svgEl.getBoundingClientRect();
  const s = Math.min(rect.width/vbo.w, rect.height/vbo.h);
  if(!isFinite(s) || s<=0) return;
  const L = 26/s;             // leader length: constant on screen
  for(const id in m.meta){
    m.meta[id].forEach((mk,i)=>{
      const show = mk.ld*s < 34;
      const line=m.leads[id][i], dot=m.marks[id][i], hit=m.hits[id][i];
      line.classList.toggle("hidden",!show);
      dot.classList.toggle("hidden",!show);
      hit.classList.toggle("hidden",!show);
      if(mk.noDot){ dot.classList.add("hidden"); hit.classList.add("hidden"); }
      if(!show) return;
      const ex = mk.to ? mk.to[0] : mk.x + Math.cos(mk.ang)*L;
      const ey = mk.to ? mk.to[1] : mk.y + Math.sin(mk.ang)*L;
      line.setAttribute("x1",mk.x); line.setAttribute("y1",mk.y);
      line.setAttribute("x2",ex);   line.setAttribute("y2",ey);
      line.setAttribute("stroke-width", 1.6/s);
      if(!mk.noDot){
        dot.setAttribute("cx",ex); dot.setAttribute("cy",ey);
        dot.setAttribute("r", 5.5/s);
        dot.setAttribute("stroke-width", 1.2/s);
        hit.setAttribute("cx",ex); hit.setAttribute("cy",ey);
        hit.setAttribute("r", 16/s);
      }
    });
  }
}
function updateMarkers(){ updateMarkersFor(main, mapEl, vb); }

/* ---------- pan / pinch / tap ---------- */
const ptrs = new Map();
let panStart=null, pinchStart=null, movedDist=0, downTarget=null;
mapEl.addEventListener("pointerdown", e=>{
  mapEl.setPointerCapture(e.pointerId);
  ptrs.set(e.pointerId, [e.clientX, e.clientY]);
  movedDist = 0;
  downTarget = e.target;
  if(ptrs.size===1){
    panStart = {cx:e.clientX, cy:e.clientY, vx:vb.x, vy:vb.y};
    mapEl.classList.add("grabbing");
  } else if(ptrs.size===2){
    panStart=null;
    const p=[...ptrs.values()];
    pinchStart = {d:Math.hypot(p[0][0]-p[1][0],p[0][1]-p[1][1]), w:vb.w,
                  mid:[(p[0][0]+p[1][0])/2,(p[0][1]+p[1][1])/2]};
  }
});
mapEl.addEventListener("pointermove", e=>{
  if(!ptrs.has(e.pointerId)) return;
  ptrs.set(e.pointerId, [e.clientX, e.clientY]);
  if(ptrs.size===1 && panStart){
    const s = screenScale();
    const dx=e.clientX-panStart.cx, dy=e.clientY-panStart.cy;
    movedDist = Math.max(movedDist, Math.hypot(dx,dy));
    vb.x = panStart.vx - dx/s; vb.y = panStart.vy - dy/s;
    clampVB(); applyVB();
  } else if(ptrs.size===2 && pinchStart){
    movedDist = 99;
    const p=[...ptrs.values()];
    const d=Math.hypot(p[0][0]-p[1][0],p[0][1]-p[1][1]);
    const mid=[(p[0][0]+p[1][0])/2,(p[0][1]+p[1][1])/2];
    const [sx,sy]=clientToSvg(mid[0],mid[1]);
    const nw = Math.min(Math.max(pinchStart.w * pinchStart.d/Math.max(d,20), MINW), MAXW);
    const f = vb.w/nw;
    vb.x = sx-(sx-vb.x)/f; vb.y = sy-(sy-vb.y)/f; vb.w=nw;
    clampVB(); applyVB();
  }
});
function endPtr(e){
  ptrs.delete(e.pointerId);
  if(ptrs.size===0){ panStart=null; pinchStart=null; mapEl.classList.remove("grabbing"); }
  else if(ptrs.size===1){ pinchStart=null;
    const p=[...ptrs.entries()][0];
    panStart={cx:p[1][0], cy:p[1][1], vx:vb.x, vy:vb.y};
  }
}
mapEl.addEventListener("pointerup", e=>{
  const tgt = downTarget;
  const wasTap = movedDist < 7 && ptrs.size===1;
  endPtr(e);
  if(wasTap && tgt && tgt.dataset && tgt.dataset.id) handleIslandTap(tgt.dataset.id);
});
mapEl.addEventListener("pointercancel", endPtr);
mapEl.addEventListener("wheel", e=>{
  e.preventDefault();
  zoomAt(e.clientX, e.clientY, e.deltaY<0 ? 1.22 : 1/1.22);
},{passive:false});
document.getElementById("zin").onclick = ()=>{const r=mapEl.getBoundingClientRect(); zoomAt(r.left+r.width/2, r.top+r.height/2, 1.5);};
document.getElementById("zout").onclick = ()=>{const r=mapEl.getBoundingClientRect(); zoomAt(r.left+r.width/2, r.top+r.height/2, 1/1.5);};
document.getElementById("zfit").onclick = fitAll;
function panBy(dx, dy){ vb.x += dx*vb.w*0.22; vb.y += dy*vb.h*0.22; clampVB(); applyVB(); }
const DIRV = {up:[0,-1], down:[0,1], left:[-1,0], right:[1,0]};
document.querySelectorAll("#edgepan button").forEach(b=>{
  let rep=null;
  const stop=()=>{ clearInterval(rep); rep=null; };
  b.addEventListener("pointerdown", e=>{
    e.preventDefault(); e.stopPropagation();
    const v=DIRV[b.dataset.dir];
    panBy(v[0], v[1]);
    stop(); rep=setInterval(()=>panBy(v[0], v[1]), 260);
  });
  ["pointerup","pointercancel","pointerleave"].forEach(ev=>b.addEventListener(ev, stop));
});
document.addEventListener("keydown", e=>{
  if(e.target.tagName==="INPUT" || e.target.tagName==="TEXTAREA") return;
  const map={ArrowUp:"up",ArrowDown:"down",ArrowLeft:"left",ArrowRight:"right"};
  if(map[e.key] && $("game").style.display!=="none"){
    e.preventDefault();
    const v=DIRV[map[e.key]]; panBy(v[0], v[1]);
  }
});

const regionBar = document.getElementById("regions");
REGIONS.forEach(rg=>{
  const b=document.createElement("button");
  b.textContent=rg.label;
  b.onclick=()=>{ if(rg.bbox) fitBBox(rg.bbox,0.06); else if(rg.ids) fitBBox(unionBBox(rg.ids),0.12); else fitAll(); };
  regionBar.appendChild(b);
});
window.addEventListener("resize", updateMarkers);

/* ---------- game state ---------- */
const $ = id=>document.getElementById(id);
let mode="click", range="all", session=0;
function later(fn,ms){ const s=session; setTimeout(()=>{ if(s===session) fn(); }, ms); }
let pool=[], idx=0, attempts=0, usedHint=false, results={}, locked=false;

document.querySelectorAll("#modeRow .opt").forEach(b=>b.onclick=()=>{
  document.querySelectorAll("#modeRow .opt").forEach(x=>x.classList.remove("sel"));
  b.classList.add("sel"); mode=b.dataset.mode;
});
document.querySelectorAll("#rangeRow .opt").forEach(b=>b.onclick=()=>{
  document.querySelectorAll("#rangeRow .opt").forEach(x=>x.classList.remove("sel"));
  b.classList.add("sel"); range=b.dataset.range;
});
function poolFor(rg){
  return ISLANDS.filter(o=> rg==="all" || (rg==="sov" ? o.grp==="sov" : o.grp!=="sov"));
}
$("cntAll").textContent = ISLANDS.length+" 個";
$("cntSov").textContent = poolFor("sov").length+" 個";
$("cntTer").textContent = poolFor("ter").length+" 個";

function shuffle(a){ for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]];} return a; }

let toastTimer=null;
function toast(msg, cls, ms){
  const t=$("toast");
  t.textContent=msg; t.className="show "+cls;
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>t.className="", ms||1300);
}

function setIslandClass(id, cls){
  main.paths[id].classList.add(cls);
  main.marks[id].forEach(c=>c.classList.add(cls));
}
function clearIslandStates(){
  ISLANDS.forEach(o=>{
    main.paths[o.id].setAttribute("class","isl");
    main.marks[o.id].forEach(c=>c.setAttribute("class","mk"));
    main.leads[o.id].forEach(c=>c.setAttribute("class","lead"));
  });
  updateMarkers();
}

function badge(grp){ return `<span class="badge b-${grp}">${GRP[grp]}</span>`; }

function startGame(){
  $("start").style.display="none";
  $("result").style.display="none";
  $("game").style.display="flex";
  clearIslandStates(); fitAll();
  $("infocard").style.display="none";
  $("legend").style.display="none";
  $("choices").style.display="none";
  session++; disarmQuit();
  results={}; idx=0;
  if(mode==="review"){ setupReview(); return; }
  pool = shuffle(poolFor(range).slice());
  $("hintbtn").style.display = mode==="click" ? "" : "none";
  $("choices").style.display = mode==="mc" ? "grid" : "none";
  nextQuestion();
}
$("startBtn").onclick = startGame;
$("againBtn").onclick = startGame;
function goHome(){
  session++; disarmQuit();
  $("result").style.display="none"; $("game").style.display="none"; $("start").style.display="flex";
  $("toast").className="";
  restoreMainMap();
}
$("homeBtn").onclick = goHome;
let quitTimer=null;
function disarmQuit(){ clearTimeout(quitTimer); quitTimer=null; const q=$("quitbtn"); q.textContent="✕ 離開"; q.classList.remove("arm"); }
$("quitbtn").onclick = ()=>{
  if(mode==="review" || quitTimer){ goHome(); return; }
  const q=$("quitbtn");
  q.textContent="確定離開？"; q.classList.add("arm");
  quitTimer=setTimeout(disarmQuit, 2500);
};

function updateStats(){
  const g=Object.values(results).filter(v=>v==="g").length;
  const y=Object.values(results).filter(v=>v==="y").length;
  const r=Object.values(results).filter(v=>v==="r").length;
  $("stats").innerHTML = `<span>第 ${Math.min(idx+1,pool.length)} / ${pool.length} 題</span>
    <span><span class="dot" style="background:var(--good)"></span>${g}</span>
    <span><span class="dot" style="background:var(--mid)"></span>${y}</span>
    <span><span class="dot" style="background:var(--bad)"></span>${r}</span>`;
}

function nextQuestion(){
  if(idx >= pool.length){ showResult(); return; }
  attempts=0; usedHint=false; locked=false;
  $("hintbtn").disabled=false;
  const t = pool[idx];
  updateStats();
  if(mode==="click"){
    $("prompt").innerHTML = `<span class="q">請點出：</span><span class="name">${t.zh}</span>${badge(t.grp)}<span class="en">${EN[t.id]}</span>`;
  } else {
    $("prompt").innerHTML = `<span class="q">閃爍的島嶼是？</span>`;
    // clear old target marks
    document.querySelectorAll(".target").forEach(n=>n.classList.remove("target"));
    setIslandClass(t.id,"target");
    const diag = Math.hypot(t.bbox[2]-t.bbox[0], t.bbox[3]-t.bbox[1]);
    if(diag > 300) fitAll(); else fitBBox(t.bbox, Math.max(2.2, 70/diag));
    buildChoices(t);
  }
}

/* ---------- click mode ---------- */
function flashResult(id, gr){
  setIslandClass(id, "res-"+gr);
  later(()=>{
    main.paths[id].classList.remove("res-"+gr);
    main.marks[id].forEach(c=>c.classList.remove("res-"+gr));
  }, 2600);
}
function grade(){
  let g = attempts===0 ? "g" : attempts===1 ? "y" : "r";
  if(usedHint && g==="g") g="y";
  return g;
}
function handleIslandTap(id){
  if(mode==="review"){ showInfo(id); return; }
  if(mode!=="click" || locked) return;
  const t = pool[idx];
  if(id === t.id){
    locked=true;
    const gr = grade();
    results[id]=gr;
    flashResult(id, gr);
    toast("✓ "+t.zh, "ok");
    updateStats();
    idx++; later(nextQuestion, 650);
  } else {
    attempts++;
    const wrongEl = main.paths[id];
    wrongEl.classList.add("flashwrong");
    main.marks[id].forEach(c=>c.classList.add("flashwrong"));
    setTimeout(()=>{ wrongEl.classList.remove("flashwrong"); main.marks[id].forEach(c=>c.classList.remove("flashwrong")); }, 450);
    if(attempts>=3){
      locked=true;
      results[t.id]="r";
      flashResult(t.id,"r");
      setIslandClass(t.id,"target");
      toast("正確位置：「"+t.zh+"」在這裡", "no", 1700);
      fitBBox(t.bbox, 2.5);
      updateStats();
      later(()=>{ main.paths[t.id].classList.remove("target"); main.marks[t.id].forEach(c=>c.classList.remove("target")); idx++; nextQuestion(); }, 1800);
    } else {
      toast("那是「"+byId[id].zh+"」，再試一次！", "no");
    }
  }
}
$("hintbtn").onclick = ()=>{
  if(mode!=="click"||locked) return;
  usedHint=true; $("hintbtn").disabled=true;
  const t=pool[idx];
  fitBBox(t.bbox, Math.max(6, 200/Math.hypot(t.bbox[2]-t.bbox[0], t.bbox[3]-t.bbox[1])));
  setIslandClass(t.id,"target");
  toast("看到閃爍的位置了嗎？（用提示最高只算黃燈）","info",2200);
  setTimeout(()=>{
    main.paths[t.id].classList.remove("target");
    main.marks[t.id].forEach(c=>c.classList.remove("target"));
  }, 2600);
};

/* ---------- multiple choice ---------- */
function buildChoices(t){
  const others = poolFor(range).filter(o=>o.id!==t.id);
  const cx=(t.bbox[0]+t.bbox[2])/2, cy=(t.bbox[1]+t.bbox[3])/2;
  others.sort((a,b)=>{
    const da=Math.hypot((a.bbox[0]+a.bbox[2])/2-cx,(a.bbox[1]+a.bbox[3])/2-cy);
    const db=Math.hypot((b.bbox[0]+b.bbox[2])/2-cx,(b.bbox[1]+b.bbox[3])/2-cy);
    return da-db;
  });
  const near = others.slice(0, Math.min(7, others.length));
  const opts = shuffle([t, ...shuffle(near).slice(0,3)]);
  const box=$("choices"); box.innerHTML="";
  opts.forEach(o=>{
    const b=document.createElement("button");
    b.innerHTML = `${o.zh}&nbsp;${badge(o.grp)}<small>${EN[o.id]}</small>`;
    b.onclick=()=>{
      if(locked) return;
      if(o.id===t.id){
        locked=true;
        b.classList.add("c-ok");
        const gr = attempts===0?"g":attempts===1?"y":"r";
        results[t.id]=gr;
        document.querySelectorAll(".target").forEach(n=>n.classList.remove("target"));
        flashResult(t.id, gr);
        toast("✓ "+t.zh,"ok");
        updateStats();
        idx++; later(nextQuestion, 850);
      } else {
        attempts++;
        b.classList.add("c-no"); b.disabled=true;
        if(attempts>=3){
          locked=true;
          results[t.id]="r";
          document.querySelectorAll(".target").forEach(n=>n.classList.remove("target"));
          flashResult(t.id,"r");
          toast("正確答案：「"+t.zh+"」","no",1500);
          updateStats();
          idx++; later(nextQuestion, 1500);
        } else {
          toast("再試一次！","no");
        }
      }
    };
    box.appendChild(b);
  });
}

/* ---------- review mode ---------- */
function setupReview(){
  $("hintbtn").style.display="none";
  $("prompt").innerHTML = `<span class="q">點選任一島嶼查看名稱</span>`;
  $("stats").innerHTML = `<span>共 ${ISLANDS.length} 個島國與屬地</span>`;
  ISLANDS.forEach(o=>{
    main.paths[o.id].classList.add("grp-"+o.grp);
    main.marks[o.id].forEach(c=>c.classList.add("grp-"+o.grp));
  });
  const lg=$("legend");
  lg.innerHTML = Object.keys(GRP).map(g=>{
    const col = getComputedStyle(document.documentElement).getPropertyValue("--g-"+g);
    const n = ISLANDS.filter(o=>o.grp===g).length;
    return `<div><i style="background:${col}"></i>${GRP[g]}（${n}）</div>`;
  }).join("");
  lg.style.display="block";
}
function showInfo(id){
  const o=byId[id];
  const c=$("infocard");
  c.innerHTML = `<div class="name">${o.zh}</div><div class="en">${EN[id]}${NOTE[id]||""}</div>${badge(o.grp)}`;
  c.style.display="block";
  document.querySelectorAll(".target").forEach(n=>n.classList.remove("target"));
  setIslandClass(id,"target");
  setTimeout(()=>{ main.paths[id].classList.remove("target"); main.marks[id].forEach(x=>x.classList.remove("target")); }, 2000);
}

/* ---------- results ---------- */
let resultSvg=null;
function showResult(){
  $("game").style.display="none";
  $("result").style.display="flex";
  const g=Object.values(results).filter(v=>v==="g").length;
  const y=Object.values(results).filter(v=>v==="y").length;
  const r=Object.values(results).filter(v=>v==="r").length;
  const pct = Math.round((g + y*0.5)/pool.length*100);
  $("scoreTxt").textContent = pct+" 分";
  $("breakTxt").innerHTML = `<span style="color:var(--good)">一次答對 ${g}</span>
    <span style="color:var(--mid)">兩次內 ${y}</span>
    <span style="color:var(--bad)">未答對 ${r}</span>`;
  const wrong = pool.filter(o=>results[o.id]!=="g");
  $("mistakes").innerHTML = wrong.length
    ? "需要複習：" + wrong.map(o=>`<b>${o.zh}</b>`).join("、")
    : "全部一次答對，太厲害了！🏝️";
  // review map
  const wrap=$("mapwrap2"); wrap.innerHTML="";
  resultSvg = document.createElementNS(svgNS,"svg");
  resultSvg.setAttribute("style","width:100%;height:100%;display:block");
  wrap.appendChild(resultSvg);
  const m = buildMap(resultSvg,false);
  updateMarkersFor(m, resultSvg, {w:MAP_W, h:MAP_H});
  pool.forEach(o=>{
    const cls = "res-"+(results[o.id]||"r");
    m.paths[o.id].classList.add(cls);
    m.marks[o.id].forEach(c=>c.classList.add(cls));
  });
  ISLANDS.filter(o=>!pool.includes(o)).forEach(o=>{
    m.paths[o.id].style.opacity=.25;
    m.marks[o.id].forEach(c=>c.classList.add("hidden"));
    m.leads[o.id].forEach(c=>c.classList.add("hidden"));
  });
}
function restoreMainMap(){ clearIslandStates(); fitAll(); }

fitAll();
</script>
